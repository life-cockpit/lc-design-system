name: Deploy MCP Server

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  AWS_REGION: 'us-east-1'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Generate component metadata
        run: npx tsx tools/extract-metadata.ts

      - name: Install MCP server dependencies
        run: cd tools/mcp-server && npm ci

      - name: Bundle Lambda
        run: |
          cd tools/mcp-server
          npx esbuild src/lambda.ts src/server.ts \
            --bundle \
            --platform=node \
            --target=node20 \
            --format=esm \
            --outdir=dist \
            --out-extension:.js=.mjs \
            --external:@aws-sdk/* \
            --banner:js="import{createRequire}from'module';const require=createRequire(import.meta.url);"
          cp ../../libs/ui-kit/component-metadata.json dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: cd tools/mcp-server/infra && npm ci

      - name: Deploy MCP stack
        run: cd tools/mcp-server/infra && npx cdk deploy LifeCockpitMcpServer --require-approval never
