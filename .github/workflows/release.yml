name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: '22'
  AWS_REGION: 'us-east-1'

jobs:
  # ==========================================================================
  # Build & Test
  # ==========================================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npx nx run ui-kit:test --ci

      - name: Generate component metadata
        run: npx tsx tools/extract-metadata.ts

      - name: Build ui-kit library
        run: npx nx build ui-kit --configuration=production

      - name: Build demo app
        run: npx nx build demo --configuration=production

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-kit-dist
          path: dist/libs/ui-kit

      - name: Upload demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-dist
          path: dist/apps/demo/browser

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: metadata
          path: libs/ui-kit/component-metadata.json

  # ==========================================================================
  # Publish to npm
  # ==========================================================================
  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v4
        with:
          name: ui-kit-dist
          path: dist

      - name: Publish to npm
        run: |
          cd dist
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ==========================================================================
  # Deploy Docs (design.life-cockpit.de)
  # ==========================================================================
  deploy-docs:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: actions/download-artifact@v4
        with:
          name: demo-dist
          path: dist/apps/demo/browser

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: cd tools/mcp-server/infra && npm ci

      - name: Deploy Docs stack
        run: cd tools/mcp-server/infra && npx cdk deploy LifeCockpitDocs --require-approval never

  # ==========================================================================
  # Deploy MCP Server (mcp.design.life-cockpit.de)
  # ==========================================================================
  deploy-mcp:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: actions/download-artifact@v4
        with:
          name: metadata
          path: tools/mcp-server/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install MCP server dependencies
        run: cd tools/mcp-server && npm ci

      - name: Bundle Lambda
        run: |
          cd tools/mcp-server
          npx esbuild src/lambda.ts src/server.ts \
            --bundle \
            --platform=node \
            --target=node20 \
            --format=esm \
            --outdir=dist \
            --out-extension:.js=.mjs \
            --external:@aws-sdk/* \
            --banner:js="import{createRequire}from'module';const require=createRequire(import.meta.url);"

      - name: Install CDK dependencies
        run: cd tools/mcp-server/infra && npm ci

      - name: Deploy MCP stack
        run: cd tools/mcp-server/infra && npx cdk deploy LifeCockpitMcpServer --require-approval never
