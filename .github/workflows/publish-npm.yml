name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Run tests
        run: npx nx run angular-ui-kit:test --ci

      - name: Build angular-ui-kit
        run: npx nx build angular-ui-kit --configuration=production

      - name: Verify build output
        run: |
          test -f dist/libs/angular-ui-kit/package.json || { echo "::error::dist/libs/angular-ui-kit/package.json missing"; exit 1; }
          echo "Publishing version:"
          node -p "require('./dist/libs/angular-ui-kit/package.json').version"

      - name: Publish
        run: |
          cd dist/libs/angular-ui-kit
          set -o pipefail
          if npm publish --access public 2>&1 | tee /tmp/npm-publish.log; then
            echo "Published successfully."
          else
            status=$?
            if grep -q -E "EPUBLISHCONFLICT|cannot publish over the previously published versions|You cannot publish over the previously published versions" /tmp/npm-publish.log; then
              echo "::warning::Version already published, skipping."
              exit 0
            fi
            echo "::error::npm publish failed with exit code $status"
            exit $status
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
