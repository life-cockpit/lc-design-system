name: Publish to npm

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '22'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Run tests
        run: npx nx run angular-ui-kit:test --ci

      - name: Build angular-ui-kit
        run: npx nx build angular-ui-kit --configuration=production

      - name: Publish
        run: cd dist/libs/angular-ui-kit && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
