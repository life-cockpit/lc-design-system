name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npx nx run angular-ui-kit:test --ci

      - name: Build angular-ui-kit library
        run: npx nx build angular-ui-kit --configuration=production

      - name: Build Storybook
        run: npx nx build-storybook angular-ui-kit
