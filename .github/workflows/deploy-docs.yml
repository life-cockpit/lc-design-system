name: Deploy Docs

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  AWS_REGION: 'eu-central-1'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Print tool versions
        run: |
          node -v
          npm -v
          npx nx --version

      - name: Build Storybook
        env:
          NX_DAEMON: 'false'
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npx nx build-storybook angular-ui-kit --skipNxCache --verbose

      - name: Generate components manifest
        run: node tools/generate-components-manifest.mjs

      - name: Build MCP Lambda
        run: cd tools/mcp-lambda && npm ci && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: cd tools/infra && npm ci

      - name: Deploy Docs stack
        run: cd tools/infra && npx cdk deploy LifeCockpitDocs --require-approval never --outputs-file cdk-outputs.json

      - name: Sync Storybook to S3
        run: |
          BUCKET_NAME=$(jq -r '.LifeCockpitDocs.DocsBucketName' tools/infra/cdk-outputs.json)
          aws s3 sync dist/storybook/angular-ui-kit/ "s3://$BUCKET_NAME/" --delete

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(jq -r '.LifeCockpitDocs.DistributionId' tools/infra/cdk-outputs.json)
          aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
