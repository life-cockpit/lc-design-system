<div 
  [class]="avatarClasses()"
  role="img"
  [attr.aria-label]="ariaLabel()"
>
  @if (showImage()) {
    <img 
      [src]="src()!" 
      [alt]="alt() || name() || 'Avatar'" 
      class="lc-avatar__image"
      (error)="onImageError()"
    />
  } @else {
    <span class="lc-avatar__initials">{{ initials() }}</span>
  }

  @if (status()) {
    <span 
      class="lc-avatar__status lc-avatar__status--{{ status() }}"
      [attr.aria-label]="status() + ' status'"
    ></span>
  }
</div>
