<div class="lc-menu">
  <!-- Trigger slot -->
  <div class="lc-menu__trigger">
    <ng-content select="[trigger]" />
  </div>

  <!-- Dropdown menu -->
  @if (isOpen) {
    <div 
      class="lc-menu__dropdown"
      [class.lc-menu__dropdown--bottom-left]="position === 'bottom-left'"
      [class.lc-menu__dropdown--bottom-right]="position === 'bottom-right'"
      [class.lc-menu__dropdown--top-left]="position === 'top-left'"
      [class.lc-menu__dropdown--top-right]="position === 'top-right'"
      [style.min-width]="minWidth"
    >
      <!-- Optional header slot -->
      <ng-content select="[header]" />

      <!-- Menu items -->
      @for (item of items; track item.id) {
        @if (item.href) {
          <!-- Link item -->
          <a
            [href]="item.href"
            [target]="item.target || '_self'"
            [attr.rel]="item.target === '_blank' ? 'noopener noreferrer' : null"
            class="lc-menu__item"
            [class.lc-menu__item--danger]="item.variant === 'danger'"
            [class.lc-menu__item--disabled]="item.disabled"
            (click)="onItemClick(item, $event)"
          >
            @if (item.icon) {
              <lc-icon [name]="item.icon" [size]="item.iconSize || 'sm'" />
            }
            <span class="lc-menu__item-content">
              <span class="lc-menu__item-label">{{ item.label }}</span>
              @if (item.metadata?.subtitle) {
                <span class="lc-menu__item-subtitle">{{ item.metadata?.subtitle }}</span>
              }
            </span>
            @if (item.metadata?.badge) {
              <span class="lc-menu__item-badge">{{ item.metadata?.badge }}</span>
            }
          </a>
        } @else {
          <!-- Button item -->
          <button
            type="button"
            class="lc-menu__item"
            [class.lc-menu__item--danger]="item.variant === 'danger'"
            [class.lc-menu__item--disabled]="item.disabled"
            [disabled]="item.disabled"
            (click)="onItemClick(item, $event)"
          >
            @if (item.icon) {
              <lc-icon [name]="item.icon" [size]="item.iconSize || 'sm'" />
            }
            <span class="lc-menu__item-content">
              <span class="lc-menu__item-label">{{ item.label }}</span>
              @if (item.metadata?.subtitle) {
                <span class="lc-menu__item-subtitle">{{ item.metadata?.subtitle }}</span>
              }
            </span>
            @if (item.metadata?.badge) {
              <span class="lc-menu__item-badge">{{ item.metadata?.badge }}</span>
            }
          </button>
        }

        @if (item.dividerAfter) {
          <hr class="lc-menu__divider" />
        }
      }

      <!-- Optional footer slot -->
      <ng-content select="[footer]" />
    </div>
  }
</div>
