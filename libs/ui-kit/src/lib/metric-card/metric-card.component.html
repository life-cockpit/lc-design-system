<lc-card variant="outlined" padding="md" borderRadius="md">
  <div class="lc-metric-card__header">
    <span class="lc-metric-card__label">{{ label() }}</span>
    @if (icon()) {
      <lc-icon [name]="icon()" size="sm" class="lc-metric-card__icon" />
    }
  </div>
  <div class="lc-metric-card__value">{{ value() }}</div>
  @if (trendValue()) {
    <div class="lc-metric-card__trend" [ngClass]="trendClasses()">
      <span class="lc-metric-card__arrow">{{ trendArrow() }}</span>
      <span class="lc-metric-card__trend-value">{{ trendValue() }}</span>
    </div>
  }
</lc-card>
