@if (true) {
  <div class="lc-page-header__breadcrumbs">
    <ng-content select="[slot='breadcrumbs']" />
  </div>

  <div class="lc-page-header__row">
    <div class="lc-page-header__titles">
      @if (title()) {
        @switch (level()) {
          @case (1) {
            <h1 class="lc-page-header__title">
              {{ title() }}
              @if (badge()) {
                <span class="lc-page-header__badge">{{ badge() }}</span>
              }
            </h1>
          }
          @case (2) {
            <h2 class="lc-page-header__title">
              {{ title() }}
              @if (badge()) {
                <span class="lc-page-header__badge">{{ badge() }}</span>
              }
            </h2>
          }
          @case (3) {
            <h3 class="lc-page-header__title">
              {{ title() }}
              @if (badge()) {
                <span class="lc-page-header__badge">{{ badge() }}</span>
              }
            </h3>
          }
        }
      }
      @if (subtitle()) {
        <p class="lc-page-header__subtitle">{{ subtitle() }}</p>
      }
    </div>

    <div class="lc-page-header__actions">
      <ng-content select="[slot='actions']" />
    </div>
  </div>

  <div class="lc-page-header__meta">
    <ng-content select="[slot='meta']" />
  </div>

  <div class="lc-page-header__body">
    <ng-content />
  </div>
}
