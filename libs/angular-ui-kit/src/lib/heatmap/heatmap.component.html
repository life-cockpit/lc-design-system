<svg [attr.width]="svgWidth()" [attr.height]="svgHeight()" [attr.viewBox]="viewBox()" role="img" aria-label="Heatmap" class="lc-heatmap">
  @for (lbl of rowLabelItems(); track lbl.y) {
    <text [attr.x]="lbl.x" [attr.y]="lbl.y" text-anchor="end" dominant-baseline="central" class="lc-heatmap__label">{{ lbl.label }}</text>
  }

  @for (lbl of colLabelItems(); track lbl.x) {
    <text [attr.x]="lbl.x" [attr.y]="lbl.y" text-anchor="middle" class="lc-heatmap__label">{{ lbl.label }}</text>
  }

  @for (cell of cells(); track $index) {
    <rect
      [attr.x]="cell.x" [attr.y]="cell.y" [attr.width]="cell.w" [attr.height]="cell.h"
      [attr.rx]="cellRadius()" [attr.fill]="colorMax()" [attr.opacity]="cell.opacity"
      class="lc-heatmap__cell"
    />
    @if (showValues()) {
      <text [attr.x]="cell.x + cell.w / 2" [attr.y]="cell.y + cell.h / 2" text-anchor="middle" dominant-baseline="central" class="lc-heatmap__cell-value">{{ cell.value }}</text>
    }
  }
</svg>
