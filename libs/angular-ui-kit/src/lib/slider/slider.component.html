<div [class]="sliderClasses()">
  @if (label()) {
    <label class="slider__label" [for]="'lc-slider'">
      {{ label() }}
      @if (showValue()) {
        <span class="slider__value">{{ value() }}</span>
      }
    </label>
  }
  <div class="slider__track-wrapper">
    <input
      id="lc-slider"
      type="range"
      class="slider__input"
      [min]="min()"
      [max]="max()"
      [step]="step()"
      [value]="value()"
      [disabled]="disabled() || isDisabled()"
      [style.--fill-percent]="fillPercentage() + '%'"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />
  </div>
  @if (!label() && showValue()) {
    <span class="slider__value slider__value--standalone">{{ value() }}</span>
  }
</div>
