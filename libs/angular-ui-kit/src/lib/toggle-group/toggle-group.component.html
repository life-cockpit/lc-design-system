<div class="lc-toggle-group" [ngClass]="sizeClass()">
  @for (option of options(); track option.value) {
    <button
      type="button"
      [class]="getButtonClasses(option)"
      [disabled]="option.disabled ?? false"
      [attr.aria-pressed]="isActive(option)"
      (click)="select(option)"
    >
      {{ option.label }}
    </button>
  }
</div>
