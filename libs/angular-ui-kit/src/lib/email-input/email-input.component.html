<lc-input
  [label]="label()"
  [placeholder]="placeholder()"
  type="email"
  [size]="size()"
  [disabled]="isDisabled"
  [readonly]="readonly()"
  [required]="required()"
  [error]="validationError()"
  [helperText]="helperText()"
  iconBefore="envelope"
  [ariaLabel]="ariaLabel() || label()"
  (valueChange)="onValueChange($event)"
  (focused)="onFocus()"
  (blurred)="onBlur()"
  (enterPressed)="onEnterPressed()"
/>
