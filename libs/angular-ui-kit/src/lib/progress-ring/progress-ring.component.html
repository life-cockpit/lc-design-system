<svg [attr.width]="svgSize()" [attr.height]="svgSize()" [attr.viewBox]="viewBox()" class="lc-progress-ring" role="img" aria-label="Progress ring">
  <circle
    [attr.cx]="center()" [attr.cy]="center()" [attr.r]="radius()"
    [attr.stroke-width]="strokeW()"
    fill="none" class="lc-progress-ring__track"
  />
  <circle
    [attr.cx]="center()" [attr.cy]="center()" [attr.r]="radius()"
    [attr.stroke-width]="strokeW()"
    [attr.stroke-dasharray]="circumference()" [attr.stroke-dashoffset]="dashOffset()"
    fill="none" stroke-linecap="round"
    [class]="'lc-progress-ring__value lc-progress-ring__value--' + color()"
    [attr.transform]="'rotate(-90 ' + center() + ' ' + center() + ')'"
  />
  @if (showValue()) {
    <text [attr.x]="center()" [attr.y]="center()" text-anchor="middle" dominant-baseline="central" class="lc-progress-ring__text" [style.font-size]="fontSize()">
      {{ displayValue() }}
    </text>
  }
</svg>
