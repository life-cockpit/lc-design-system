<div class="lc-filter-bar" [class]="sizeClass()">
  @for (filter of filters(); track filter.key) {
    <div class="lc-filter-bar__item">
      @if (filter.label) {
        <label class="lc-filter-bar__label">{{ filter.label }}</label>
      }

      @switch (filter.type) {
        @case ('select') {
          <lc-select
            class="lc-filter-bar__select"
            [size]="size() === 'sm' ? 'sm' : 'md'"
            [placeholder]="filter.placeholder ?? 'Select an option'"
            [options]="getSelectOptions(filter.options)"
            [ariaLabel]="filter.label || filter.placeholder || filter.key"
            [ngModel]="getValue(filter.key)"
            (ngModelChange)="onFilterChange(filter.key, normalizeSelectValue($event))"
          />
        }

        @case ('toggle') {
          <div class="lc-filter-bar__toggle-group">
            @for (opt of filter.options; track opt.value) {
              <button
                type="button"
                [class]="getToggleClasses(filter.key, opt)"
                [disabled]="opt.disabled ?? false"
                (click)="onFilterChange(filter.key, opt.value)"
              >
                {{ opt.label }}
              </button>
            }
          </div>
        }

        @case ('search') {
          <lc-search-input
            class="lc-filter-bar__search"
            [placeholder]="filter.placeholder ?? 'Search...'"
            [size]="size() === 'sm' ? 'sm' : 'md'"
            [debounceMs]="0"
            (searchChange)="onSearchInput(filter.key, $event)"
          />
        }
      }
    </div>
  }
</div>
