<div class="lc-filter-bar" [class]="sizeClass()">
  @for (filter of filters(); track filter.key) {
    <div class="lc-filter-bar__item">
      @if (filter.label) {
        <label class="lc-filter-bar__label">{{ filter.label }}</label>
      }

      @switch (filter.type) {
        @case ('select') {
          <div class="lc-filter-bar__select-wrapper">
            <select
              class="lc-filter-bar__select"
              [value]="getValue(filter.key)"
              (change)="onFilterChange(filter.key, $any($event.target).value)"
            >
              @if (filter.placeholder) {
                <option value="">{{ filter.placeholder }}</option>
              }
              @for (opt of filter.options; track opt.value) {
                <option
                  [value]="opt.value"
                  [disabled]="opt.disabled ?? false"
                >
                  {{ opt.label }}
                </option>
              }
            </select>
            <!-- Chevron icon -->
            <svg class="lc-filter-bar__select-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
            </svg>
          </div>
        }

        @case ('toggle') {
          <div class="lc-filter-bar__toggle-group">
            @for (opt of filter.options; track opt.value) {
              <button
                type="button"
                [class]="getToggleClasses(filter.key, opt)"
                [disabled]="opt.disabled ?? false"
                (click)="onFilterChange(filter.key, opt.value)"
              >
                {{ opt.label }}
              </button>
            }
          </div>
        }

        @case ('search') {
          <div class="lc-filter-bar__search-wrapper">
            <!-- Search icon -->
            <svg class="lc-filter-bar__search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
            <input
              type="text"
              class="lc-filter-bar__search-input"
              [placeholder]="filter.placeholder ?? 'Search...'"
              [value]="getValue(filter.key)"
              (input)="onSearchInput(filter.key, $event)"
            />
          </div>
        }
      }
    </div>
  }
</div>
