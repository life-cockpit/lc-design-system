<div
  class="popover"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  <div class="popover__trigger" (click)="trigger() === 'click' ? toggle() : null">
    <ng-content select="[popover-trigger]"></ng-content>
  </div>
  @if (isOpen()) {
    <div [class]="panelClasses()" role="dialog" aria-modal="false">
      <ng-content select="[popover-content]"></ng-content>
    </div>
  }
</div>
