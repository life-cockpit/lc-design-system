<div class="lc-password-input">
  <label [for]="'password-' + label" class="lc-label">
    {{ label }}
    @if (required) {
      <span class="lc-required">*</span>
    }
  </label>

  <div class="lc-input-wrapper">
    <input
      [id]="'password-' + label"
      [type]="isPasswordVisible ? 'text' : 'password'"
      [value]="value"
      [placeholder]="placeholder"
      [disabled]="disabled"
      [required]="required"
      [attr.aria-invalid]="error ? 'true' : 'false'"
      [attr.aria-describedby]="error ? 'password-error' : null"
      (input)="onInput($event)"
      (blur)="onBlur()"
      class="lc-input"
      [class.lc-input-error]="error"
    />

    <button
      type="button"
      (click)="togglePasswordVisibility()"
      [attr.aria-label]="isPasswordVisible ? 'Hide password' : 'Show password'"
      class="lc-toggle-btn"
      [disabled]="disabled"
    >
      @if (!isPasswordVisible) {
        <lc-icon name="eye" size="md"></lc-icon>
      }
      @if (isPasswordVisible) {
        <lc-icon name="eye-slash" size="md"></lc-icon>
      }
    </button>
  </div>

  @if (error) {
    <div id="password-error" class="lc-error" role="alert">
      {{ error }}
    </div>
  }

  @if (showStrengthMeter) {
    <div class="lc-strength-meter">
      <div class="lc-strength-bar">
        <div
          class="lc-strength-fill"
          [style.width.%]="strength.percentage"
          [class.lc-strength-weak]="strength.level === 'Weak'"
          [class.lc-strength-fair]="strength.level === 'Fair'"
          [class.lc-strength-good]="strength.level === 'Good'"
          [class.lc-strength-strong]="strength.level === 'Strong'"
        ></div>
      </div>
      <div class="lc-strength-label" [class]="'lc-strength-' + strength.level.toLowerCase()">
        {{ strength.level }}
      </div>
    </div>
  }

  @if (showRequirements) {
    <lc-alert variant="info" [dismissible]="false">
      @for (req of requirements; track req.label) {
        <div
          class="lc-requirement"
          [class.lc-requirement-met]="req.met"
          [class.lc-requirement-unmet]="!req.met"
        >
          <span class="lc-requirement-icon">{{ req.icon }}</span>
          <span class="lc-requirement-label">{{ req.label }}</span>
        </div>
      }
    </lc-alert>
  }
</div>
