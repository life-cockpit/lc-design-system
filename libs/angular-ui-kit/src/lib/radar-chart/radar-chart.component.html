<div class="lc-radar-chart">
  <svg [attr.width]="size()" [attr.height]="size()" [attr.viewBox]="viewBox()" role="img" aria-label="Radar chart" class="lc-radar-chart__svg">
    @for (ring of gridRings(); track $index) {
      <polygon [attr.points]="ring" class="lc-radar-chart__grid" />
    }

    @for (axis of axisLines(); track $index) {
      <line [attr.x1]="center()" [attr.y1]="center()" [attr.x2]="axis.x2" [attr.y2]="axis.y2" class="lc-radar-chart__axis" />
    }

    @for (ser of seriesPolygons(); track ser.label) {
      <polygon [attr.points]="ser.points" [class]="'lc-radar-chart__polygon lc-radar-chart__polygon--' + ser.colorIndex" [attr.fill]="ser.customColor" [attr.stroke]="ser.customColor" [attr.fill-opacity]="fillOpacity()" stroke-width="2" />
    }

    @for (lbl of labelItems(); track lbl.label) {
      <text [attr.x]="lbl.x" [attr.y]="lbl.y" [attr.text-anchor]="lbl.anchor" dominant-baseline="central" class="lc-radar-chart__label">{{ lbl.label }}</text>
    }
  </svg>

  @if (legendItems().length) {
    <div class="lc-radar-chart__legend">
      @for (item of legendItems(); track item.label) {
        <div class="lc-radar-chart__legend-item">
          <span [class]="'lc-radar-chart__legend-dot lc-radar-chart__legend-dot--' + item.colorIndex" [style.background-color]="item.customColor"></span>
          <span class="lc-radar-chart__legend-text">{{ item.label }}</span>
        </div>
      }
    </div>
  }
</div>
