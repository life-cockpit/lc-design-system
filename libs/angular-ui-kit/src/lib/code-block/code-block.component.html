<div [class]="codeClasses()">
  @if (showHeader()) {
    <div class="code-block__header">
      <span class="code-block__language">{{ headerLabel() }}</span>
      @if (showCopy()) {
        <button
          type="button"
          class="code-block__copy"
          [attr.aria-label]="copied() ? 'Copied' : 'Copy code'"
          (click)="copyToClipboard()"
        >
          @if (copied()) {
            <lc-icon name="check" size="sm" />
            <span>Copied</span>
          } @else {
            <lc-icon name="clipboard-document" size="sm" />
            <span>Copy</span>
          }
        </button>
      }
    </div>
  }
  <div class="code-block__body">
    <pre class="code-block__pre"><code class="code-block__code">@for (line of highlightedLines(); track $index; let i = $index) {<span class="code-block__line">@if (showLineNumbers()) {<span class="code-block__line-number">{{ lineNumbers()[i] }}</span>}<span class="code-block__line-content" [innerHTML]="line"></span></span>
}</code></pre>
  </div>
</div>
