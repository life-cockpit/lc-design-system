<div [class]="accordionClasses()" role="region">
  <button
    class="lc-accordion__header"
    [attr.aria-expanded]="expanded()"
    [attr.aria-disabled]="disabled()"
    [disabled]="disabled()"
    (click)="toggle()"
    (keydown)="onKeydown($event)"
  >
    <span class="lc-accordion__title">{{ title() }}</span>
    <lc-icon
      class="lc-accordion__icon"
      name="chevron-down"
      size="sm"
    ></lc-icon>
  </button>

  <div class="lc-accordion__panel" [attr.aria-hidden]="!expanded()">
    <div class="lc-accordion__body">
      <ng-content></ng-content>
    </div>
  </div>
</div>
