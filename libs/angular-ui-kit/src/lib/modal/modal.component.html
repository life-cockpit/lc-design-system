@if (_open()) {
  <!-- Backdrop (the lc-modal does NOT use CDK Overlay; do not add the
       `cdk-overlay-backdrop` class here — it would be styled by global CDK
       rules and, vice versa, leak modal styling onto other overlays.) -->
  <div
    class="lc-modal-backdrop"
    (click)="onBackdropClick($event)"
  ></div>

  <!-- Modal Content -->
  <div
    #modalContent
    [class]="modalClasses()"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-labelledby]="ariaLabelledBy()"
    [attr.aria-describedby]="ariaDescribedBy()"
    cdkTrapFocus
    [cdkTrapFocusAutoCapture]="true"
  >
    <div class="lc-modal__header">
      <ng-content select="[slot='header']" />
      
      @if (showCloseButton()) {
        <button
          type="button"
          class="lc-modal__close"
          aria-label="Close modal"
          (click)="onCloseClick($event)"
        >
          <lc-icon name="x-mark" size="md" />
        </button>
      }
    </div>
    
    <div class="lc-modal__body">
      <ng-content select="[slot='body']" />
      <ng-content />
    </div>
    
    <div class="lc-modal__footer">
      <ng-content select="[slot='footer']" />
    </div>
  </div>
}
