<div class="lc-textarea-wrapper">
  @if (label) {
    <label class="lc-textarea-label" [class.lc-textarea-label--required]="required">
      {{ label }}
      @if (required) {
        <span class="lc-textarea-required-indicator">*</span>
      }
    </label>
  }

  <div class="lc-textarea-input-wrapper">
    <textarea
      #textarea
      [class]="textareaClasses"
      [value]="value()"
      [placeholder]="placeholder"
      [disabled]="disabled"
      [readonly]="readonly"
      [required]="required"
      [rows]="autoResize ? undefined : rows"
      [attr.maxlength]="maxLength"
      [attr.aria-label]="ariaLabel"
      [attr.aria-required]="required"
      [attr.aria-invalid]="error"
      (input)="onInput(getInputValue($event))"
      (blur)="onBlur()"
    ></textarea>
  </div>

  <div class="lc-textarea-footer">
    <div class="lc-textarea-messages">
      @if (error && errorMessage) {
        <span class="lc-textarea-error-message">{{ errorMessage }}</span>
      } @else if (helperText) {
        <span class="lc-textarea-helper-text">{{ helperText }}</span>
      }
    </div>

    @if (showCharacterCount) {
      <span 
        class="lc-textarea-character-count" 
        [class.lc-textarea-character-count--over-limit]="isOverLimit()"
      >
        {{ characterCountText() }}
      </span>
    }
  </div>
</div>
