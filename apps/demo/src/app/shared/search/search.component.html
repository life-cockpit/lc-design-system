<div class="relative">
  <div class="relative">
    <input
      type="text"
      [value]="query()"
      (input)="onSearchChange($event)"
      [placeholder]="placeholder()"
      class="w-full h-10 pl-10 pr-4 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-900 text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent"
      aria-label="Search"
    />

    <!-- Search Icon -->
    <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        />
      </svg>
    </div>

    <!-- Clear Button -->
    @if (query()) {
      <button
        type="button"
        (click)="onClear()"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"
        aria-label="Clear search"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    }
  </div>

  <!-- Search Results Dropdown (if provided) -->
  @if (showResults() && results().length > 0) {
    <div
      class="absolute z-50 w-full mt-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg max-h-96 overflow-y-auto"
    >
      <ul class="py-2">
        @for (result of results(); track result.id) {
          <li>
            <button
              type="button"
              (click)="onResultClick(result)"
              class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
            >
              <p class="text-sm font-medium text-gray-900 dark:text-white">
                {{ result.title }}
              </p>
              @if (result.description) {
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                  {{ result.description }}
                </p>
              }
            </button>
          </li>
        }
      </ul>
    </div>
  }

  <!-- No Results Message -->
  @if (showResults() && query() && results().length === 0) {
    <div
      class="absolute z-50 w-full mt-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg p-4"
    >
      <p class="text-sm text-gray-500 dark:text-gray-400 text-center">
        No results found for "{{ query() }}"
      </p>
    </div>
  }
</div>
