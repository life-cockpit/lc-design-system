<div class="p-8">
  <div class="mb-8">
    <h1 class="text-4xl font-bold mb-4">Spinner Component</h1>
    <p class="text-neutral-600 dark:text-neutral-400">
      Loading indicator with optional message text. Used to show that content is being fetched.
    </p>
  </div>

  <!-- Basic Usage -->
  <section class="mb-12">
    <h2 class="text-2xl font-semibold mb-4">Basic Usage</h2>

    <lc-card>
      <div class="space-y-6">
        <lc-spinner />

        <pre class="bg-neutral-900 text-neutral-100 rounded-lg p-4 text-sm overflow-x-auto"><code>{{ basicExample }}</code></pre>
      </div>
    </lc-card>
  </section>

  <!-- With Message -->
  <section class="mb-12">
    <h2 class="text-2xl font-semibold mb-4">With Message</h2>

    <lc-card>
      <div class="space-y-6">
        <lc-spinner message="Loading data..." />

        <pre class="bg-neutral-900 text-neutral-100 rounded-lg p-4 text-sm overflow-x-auto"><code>{{ messageExample }}</code></pre>
      </div>
    </lc-card>
  </section>

  <!-- Sizes -->
  <section class="mb-12">
    <h2 class="text-2xl font-semibold mb-4">Sizes</h2>

    <lc-card>
      <div class="space-y-6">
        <div class="grid grid-cols-3 gap-8">
          <div class="text-center">
            <lc-spinner size="sm" />
            <p class="text-xs text-neutral-500 mt-2">sm</p>
          </div>
          <div class="text-center">
            <lc-spinner size="md" />
            <p class="text-xs text-neutral-500 mt-2">md (default)</p>
          </div>
          <div class="text-center">
            <lc-spinner size="lg" />
            <p class="text-xs text-neutral-500 mt-2">lg</p>
          </div>
        </div>

        <pre class="bg-neutral-900 text-neutral-100 rounded-lg p-4 text-sm overflow-x-auto"><code>{{ sizesExample }}</code></pre>
      </div>
    </lc-card>
  </section>

  <!-- Sizes with Messages -->
  <section class="mb-12">
    <h2 class="text-2xl font-semibold mb-4">Sizes with Messages</h2>

    <lc-card>
      <div class="grid grid-cols-3 gap-8">
        <div>
          <lc-spinner size="sm" message="Loading..." />
        </div>
        <div>
          <lc-spinner size="md" message="Loading dashboard data..." />
        </div>
        <div>
          <lc-spinner size="lg" message="Loading your portfolio..." />
        </div>
      </div>
    </lc-card>
  </section>

  <!-- Inside Cards -->
  <section class="mb-12">
    <h2 class="text-2xl font-semibold mb-4">Inside Cards</h2>

    <div class="grid grid-cols-2 gap-4">
      <lc-card title="Market Overview">
        <lc-spinner size="sm" message="Fetching market data..." />
      </lc-card>
      <lc-card title="Trade History">
        <lc-spinner size="sm" message="Loading trades..." />
      </lc-card>
    </div>
  </section>

  <!-- API Reference -->
  <section class="mb-12">
    <h2 class="text-2xl font-semibold mb-4">API Reference</h2>

    <lc-card>
      <lc-table
        [columns]="apiTable"
        [data]="apiData"
        variant="default"
        size="sm"
      />
    </lc-card>
  </section>
</div>
