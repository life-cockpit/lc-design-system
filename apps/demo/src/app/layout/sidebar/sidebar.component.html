<!-- Mobile Overlay -->
@if (isOpen() && isMobile()) {
  <div
    class="fixed inset-0 bg-black bg-opacity-50 z-30 md:hidden"
    (click)="closeSidebar.emit()"
    aria-hidden="true"
  ></div>
}

<!-- Sidebar -->
<aside
  class="w-64 h-full bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 overflow-y-auto transition-transform duration-300"
  [class.translate-x-0]="isOpen()"
  [class.-translate-x-full]="!isOpen()"
>
  <nav class="p-4 space-y-6">
    @for (section of navSections; track section.label) {
      <div>
        <h2
          class="px-3 mb-2 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider"
        >
          {{ section.label }}
        </h2>
        <ul class="space-y-1">
          @for (item of section.children; track item.path) {
            <li>
              <a
                [routerLink]="item.path"
                routerLinkActive="bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400"
                [routerLinkActiveOptions]="{ exact: item.path === '/' }"
                class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                (click)="onNavItemClick()"
              >
                @if (item.icon) {
                  <lc-icon [name]="item.icon" size="md" />
                }
                <span>{{ item.label }}</span>
              </a>
            </li>
          }
        </ul>
      </div>
    }
  </nav>
</aside>
